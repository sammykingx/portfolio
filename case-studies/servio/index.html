            title="Servio Architecture" 
            client="Service Execution Platform"
        >
			<template>
            	<!-- THE CHALLENGE: 3 Paragraphs -->
				<div class="space-y-4 text-justify" slot="challenge">
					<p>Service hiring is broken, not because platforms didn't exist, but because none of them enforced structure. Clients juggled WhatsApp threads, vague verbal agreements, and chased payments after delivery. Providers undercut their own value just to win bids in race-to-the-bottom marketplaces.</p>
					<p>The real bottleneck wasn't discovery; It was execution. Specifically, the absence of a structured handshake between what a client needs, what a provider commits to, and how money moves when work is done.</p>
					<p>Servio needed an infrastructure layer that enforced three non-negotiables:</p>
					<ul class="list-disc pl-6 space-y-3 text-white/80">
						<li>Every engagement begins with a defined scope, no vague briefs, no scope creep.</li>
						<li>Every agreement is contract-backed before a single dollar moves.</li>
						<li>Every payment is tied to execution logic, not manual trust.</li>
					</ul>
				</div>

				<!-- MODULAR SYSTEMS: Deep Tech Paragraphs -->
				<div class="space-y-4 text-justify" slot="modular">
					<p>The entire Servio execution flow was built as a decoupled system with each layer independent, each responsible for a single concern. Service requests, proposals, contracts, and payments are not one monolithic pipeline; they are discrete modules that hand off to each other through defined state transitions.</p>
					<p>Proposals are structured agreements, not chat messages. Each one carries defined deliverables, pricing, and timelines. When a client accepts a proposal, the system doesn't just record a "yes"; it triggers a contract formation event, generating a structured agreement both parties review and sign before a single payment instruction is issued. The contract is the source of truth. Everything downstream(payment options, release logic, execution timelines) is derived from it.</p>
					<p>On the payment layer, I treated providers like Paystack, Stripe, and Square as pluggable adapters rather than hardcoded dependencies. Swapping or layering payment rails never touches the proposal or contract logic above it. The core workflow(service request, proposal, contract, payments) stays stable regardless of what changes at the infrastructure level.</p>
				</div>

				<!-- WORKFLOW SEPARATION: Engineering Narrative -->
				<div class="space-y-4 text-justify" slot="separation">
					<p>The most critical architectural decision was how state moves through the system. A service request isn't just a post, it's an entry point into a structured lifecycle. When a provider submits a proposal, it becomes a job request. When the client accepts, the system transitions that job into a contract phase automatically no manual handoff, no human-in-the-loop. The contract is generated, presented for view, signed, and then and only then does the payment flow begin.</p>
					<p>This sequence is enforced at the system level, not the UI level. Clients cannot proceed to payment without a signed contract. Providers cannot begin execution without a confirmed payment commitment. The workflow itself becomes the guardrail.</p>
					<p>To keep this real-time without hammering the primary database, I separated transactional state updates from application state entirely. Firebase Cloud Messaging and service workers handle live push notifications so clients and providers see contract status, payment confirmations, and execution triggers the moment they happen. The database handles persistence. Firebase handles presence. Neither bleeds into the other's responsibility.</p>
				</div>

				<!-- INFRASTRUCTURE GROWTH: Business Strategy -->
				<div class="space-y-4 text-justify"slot="growth">
					<p>Servio's infrastructure wasn't built for where the platform is today, it was built for where it's going. Every architectural decision was made with scale, geography, and service complexity as the baseline assumptions.</p>
					<p>The data layer supports multi-currency transactions natively. A client in Lagos paying in NGN via Paystack and a client in New York settling in USD via Stripe operate on the same underlying contract and payment logic; the currency is just a variable, not a structural difference. This wasn't bolted on after the fact; it was designed into the schema from day one so that market expansion never requires a data migration or an architectural rethink.</p>
					<p>Beyond one-off jobs, the system is structured to support recurring service engagements(cleaners on weekly schedules, social media managers on monthly retainers, maintenance contracts that auto-renew). Recurring requests carry their own contract templates, billing cycles, and execution checkpoints. The infrastructure treats repeat service work as a first-class citizen, not an edge case.</p>
					<p>Underpinning all of this is cloud-native observability(logging, monitoring, and alerting) baked into the deployment layer. System health is visible in real time. Infrastructure needs get predicted and addressed before they surface as user-facing incidents. Servio doesn't react to fires. It sees them coming and routes around them.</p>
				</div>

				<!-- FUTURE EXTENSIBILITY: The Roadmap -->
				<div class="space-y-4 text-justify" slot="extensibility">
					<p>The most important thing I built into Servio isn't a feature, it's surface area. The platform is designed to absorb new verticals, new integrations, and new service categories without touching the core execution engine.</p>
					<p>Service taxonomies are JSON-defined, meaning onboarding a new service category (HVAC, event photography, legal consulting) is a configuration change, not a development sprint. The system already knows how to handle proposals, contracts, and payments for any service type. What changes is the shape of the request, not the infrastructure behind it.</p>
					<p>The internal API layer was built with composability in mind. They connect to Servio's workflow through clean integration points rather than deep couplings. This means Servio can evolve from an execution system into a full business operating system for service providers, layer by layer, without breaking what's already running.</p>
					<p>Servio is not a platform that needs to be rebuilt to grow. It needs to connect, configure, and extend. That was the intent from the first line of code.</p>
				</div>

				<!-- OUTCOME: Millionaire Positioning -->
				<div class="space-y-4 text-justify" slot="outcome">
					<p>What I built with Servio is not a marketplace. It's a structured environment where service execution becomes possible systematically, reliably, and at scale.</p>
					<p>Before Servio, service hiring looked like this: <span class="italic text-rose-400">a client posts a vague request, providers respond with inconsistent quotes, a price is agreed over chat, work starts without a written commitment, and payment gets chased after delivery. Every step was informal. Every step was a failure point.</span></p>
					<p>After Servio, that entire process runs through a single structured flow. <span class="text-emerald-400 italic">A client submits a request. Providers respond with proposals that carry real scope(defined deliverables, pricing, and timelines). The client accepts. A contract is generated, viewed, and signed. Payment is committed; not promised, committed before execution begins</span>. And the payment itself is guarded: clients can choose full immediate release, scheduled smart release, or a setup fee structure that locks both parties into the engagement without requiring full upfront capital. Providers don't start work on a handshake. They start work on a contract with funds already in motion.</p>
					<p>That entire sequence from service request to signed contract to guarded payment to execution is enforced by the system. Not by trust. Not by goodwill. By infrastructure.</p>

					<p><strong>The Results:</strong></p>
					<ul class="grid grid-cols-1 md:grid-cols-2 gap-4 my-8">
						<li class="p-4 bg-white/5 rounded-lg border border-white/10">
							<span class="text-accent font-semibold block mb-1">End-to-End Execution Flow</span>
							<span class="text-sm">Every engagement runs through a single structured pipeline( service request, proposal, contract, payments) with no informal gaps between steps and no human-in-the-loop handoffs slowing it down.</span>
						</li>
						<li class="p-4 bg-white/5 rounded-lg border border-white/10">
							<span class="text-accent font-semibold block mb-1">Contract-Backed Commitments</span>
							<span class="text-sm">No payment moves without a signed contract. No execution begins without a confirmed payment commitment. The system enforces the sequence neither party can skip steps.</span>
						</li>
						<li class="p-4 bg-white/5 rounded-lg border border-white/10">
							<span class="text-accent font-semibold block mb-1">40% Drop in Transaction Abandonment</span>
							<span class="text-sm">Real-time state updates and structured payment flows kept users inside the process. Uncertainty was the enemy, eliminating it eliminated drop-off.</span>
						</li>
						<li class="p-4 bg-white/5 rounded-lg border border-white/10">
							<span class="text-accent font-semibold block mb-1">Zero Manual Payment Intervention</span>
							<span class="text-sm">High-value deposits ($2,500+) process, hold, and release automatically based on contract logic, no internal team involvement, no delays, no errors.</span>
						</li>
					</ul>

					<p>What this project proves is not just that I can build systems, it's that I build systems that replace chaos with structure. I came into Servio as Engineering Lead, identified every point where the platform was losing clients, losing providers, and losing trust, and engineered the infrastructure that closed every gap. The result is a platform where service work actually gets done clearly scoped, properly contracted, and cleanly paid. That's what I do.</p>
